<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOD Control Panel</title>
    <style>
        body {
            margin: 0;
            padding: 1rem;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f0f0f0;
        }

        .app-container {
            display: flex;
            height: 96vh;
            gap: 1rem;
        }

        .panel-dev {
            flex: 1;
            max-width: 280px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 0.5rem;
            overflow: visible !important;
        }

        .panel {
            flex: 1;
            background: white;
            border: 1px solid #ccc;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background-color: #f0f0f0;
        }

        .data-table th {
            padding: 0.75rem;
            text-align: left;
        }

        .control-panel {
            display: flex;
            flex-direction: column;
        }

        .lua-management {
            display: flex;
            height: 150px;
            gap: 1rem;
            padding: 0.5rem;
        }

        .lua-list-container {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #ccc;
            border-radius: 0.25rem;
            padding: 0.25rem;
        }

        .tree_contents {
            margin-left: 15px;
        }

        .dev-item {
            margin-left: 0;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .dev-item:hover,
        .bus_item:hover {
            background-color: #add7f3;
        }

        .dev-item.active {
            background-color: #e0f0ff;
        }

        .tooltip {
            visibility: hidden;
            position: absolute;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            text-align: left;
            max-width: 300px;
            min-width: 120px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
        }

        .tooltip.right {
            left: calc(150% + 10px);
            top: 50%;
            transform: translateY(-10%);
        }

        .icon {
            display: inline-block;
            position: relative;
            padding: 0.25rem 0.5rem;
        }

        .device-icon:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .control-buttons {
            display: grid;
            gap: 0.5rem;
            width: 140px;
            align-content: start;
        }

        .action-button {
            padding: 0.75rem;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s, transform 0.2s;
        }

        .action-button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .button-restart {
            background-color: #4caf50;
            color: white;
        }

        .button-refresh {
            background-color: #1976d2;
            color: white;
        }

        .heap-status {
            padding: 0.5rem;
            font-size: 14px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 0.25rem;
            min-height: 1.5rem;
        }

        .textarea {
            flex: 1;
            width: 100%;
            padding: 1rem;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 0.25rem;
            resize: none;
            font-family: "JetBrains Mono", monospace;
            font-size: 14px;
            line-height: 1.5;
        }

        .inputarea {
            flex: 1;
            max-height: 44px;
            padding: 1rem;
            border: 1px solid #ccc;
            border-radius: 0.25rem;
            resize: none;
            font-family: "JetBrains Mono", monospace;
            font-size: 14px;
            line-height: 1.5;
            overflow-y: auto;
        }

        .expanded .folder-icon::before {
            content: "[-] ";
        }

        .collapsed .folder-icon::before {
            content: "[+] ";
        }

        .device-icon::before {
            content: "[*] ";
        }

        .thread-item {
            border-bottom: 1px solid #eee;
            padding: 0.5rem 0.25rem;
        }

        .thread-item:last-child {
            border-bottom: none;
        }

        .thread-name {
            font-weight: 600;
        }

        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
        }

        .connection-status.connected {
            background: #4caf50;
            color: white;
        }

        .connection-status.disconnected {
            background: #f44336;
            color: white;
        }

        .connection-status.reconnecting {
            background: #ff9800;
            color: white;
        }

        .no-data {
            padding: 0.75rem;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Pi-Trunk MOD</h1>
    <div class="app-container">
        <div class="panel-dev">
            <table class="data-table" id="tree-table">
                <thead><tr><th>Device Tree</th></tr></thead>
            </table>
            <div class="tree_contents" id="dev-tree"></div>
        </div>

        <div class="panel control-panel">
            <table class="data-table">
                <thead><tr><th>Lua Thread Management</th></tr></thead>
            </table>
            <div class="lua-management">
                <div class="lua-list-container" id="threadList"></div>
                <div class="control-buttons">
                    <button class="action-button button-restart" id="btnRestart">Restart Lua</button>
                    <button class="action-button button-refresh" id="btnRefresh">Refresh Tree</button>
                    <s1>Free RAM:</s1>
                    <div id="HeapStatus" class="heap-status"></div>
                </div>
            </div>
            <table class="data-table">
                <thead><tr><th>Terminal</th></tr></thead>
            </table>
            <textarea class="textarea" id="printDisplay" readonly spellcheck="false"></textarea>
            <textarea
                class="inputarea"
                id="tasinput"
                placeholder="Type a command and press Enter"
                spellcheck="false"
            ></textarea>
        </div>
    </div>
    <div id="connectionStatus" class="connection-status">Connecting...</div>
    <script>
        const requestWithTimeout = (url, timeout = 2000) => {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeout);
            return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
        };

        const parseMaybeJson = (value) => {
            if (typeof value !== "string") {
                return value;
            }
            const trimmed = value.replace(/^dev_tree:/, "").trim();
            try {
                return JSON.parse(trimmed);
            } catch (error) {
                return value;
            }
        };

        const eventSourceManager = {
            eventSource: null,
            reconnectAttempts: 0,
            maxReconnectAttempts: 5,
            reconnectInterval: 10000,
            connectionStatus: null,

            init() {
                this.connectionStatus = document.getElementById("connectionStatus");
                this.connect();
            },

            connect() {
                this.eventSource = new EventSource("/events.event");

                this.eventSource.onopen = () => {
                    console.log("SSE connection established");
                    this.connectionStatus.textContent = "Connected";
                    this.connectionStatus.className = "connection-status connected";
                    this.reconnectAttempts = 0;
                };

                this.eventSource.onmessage = (event) => {
                    try {
                        const message = JSON.parse(event.data);
                        this.handleMessage(message);
                    } catch (error) {
                        console.error("Message parse error:", error);
                    }
                };

                this.eventSource.addEventListener("dev_tree", (event) => {
                    deviceTreeManager.updateDeviceTree(parseMaybeJson(event.data));
                });

                this.eventSource.addEventListener("lua_thread", (event) => {
                    luaThreadManager.updateThreadList(parseMaybeJson(event.data));
                });

                this.eventSource.addEventListener("str_output", (event) => {
                    terminalManager.appendOutput(parseMaybeJson(event.data));
                });

                this.eventSource.addEventListener("free_memory", (event) => {
                    this.updateHeapStatus(parseMaybeJson(event.data));
                });

                this.eventSource.onerror = (error) => {
                    console.error("SSE error:", error);
                    this.connectionStatus.textContent = "Connection error";
                    this.connectionStatus.className = "connection-status disconnected";
                    this.reconnect();
                };
            },

            handleMessage(message) {
                switch (message.type) {
                    case "dev_tree":
                        deviceTreeManager.updateDeviceTree(parseMaybeJson(message.data));
                        break;
                    case "lua_thread":
                        luaThreadManager.updateThreadList(parseMaybeJson(message.data));
                        break;
                    case "str_output":
                        terminalManager.appendOutput(parseMaybeJson(message.data));
                        break;
                    case "free_memory":
                        this.updateHeapStatus(parseMaybeJson(message.data));
                        break;
                    default:
                        console.log("Unknown message type:", message);
                        break;
                }
            },

            updateHeapStatus(data) {
                const heapElement = document.getElementById("HeapStatus");
                if (!heapElement || data == null || data === "") {
                    return;
                }
                const numeric = Number(data);
                if (Number.isFinite(numeric)) {
                    heapElement.textContent = `${(numeric / 1024).toFixed(3)} KB`;
                } else {
                    heapElement.textContent = String(data);
                }
            },

            reconnect() {
                if (this.eventSource) {
                    this.eventSource.close();
                }

                if (this.reconnectAttempts < this.maxReconnectAttempts) {
                    this.reconnectAttempts++;
                    this.connectionStatus.textContent = `Reconnecting... (${this.reconnectAttempts}/${this.maxReconnectAttempts})`;
                    this.connectionStatus.className = "connection-status reconnecting";
                    setTimeout(() => this.connect(), this.reconnectInterval);
                }
            }
        };

        const deviceTreeManager = {
            rootFolder: document.getElementById("dev-tree"),

            updateDeviceTree(data) {
                const container = this.rootFolder;
                if (!container) {
                    return;
                }

                container.innerHTML = "";
                if (!data || (Array.isArray(data) && data.length === 0)) {
                    container.innerHTML = '<div class="no-data">No device data available</div>';
                    return;
                }

                const nodes = Array.isArray(data) ? data : [data];
                nodes.forEach((node) => this.renderNode(node, container));
            },

            renderNode(node, parentElement) {
                if (!node || !node.name) {
                    return;
                }

                if (Array.isArray(node.device) && node.device.length > 0) {
                    const wrapper = document.createElement("div");
                    const busElement = document.createElement("div");
                    busElement.className = "bus_item expanded";
                    busElement.innerHTML = `<div class="icon folder-icon"><span>${node.name}</span></div>`;

                    const contents = document.createElement("div");
                    contents.className = "tree_contents";

                    busElement.addEventListener("click", (event) => {
                        event.stopPropagation();
                        const expanded = busElement.classList.contains("expanded");
                        busElement.classList.toggle("expanded", !expanded);
                        busElement.classList.toggle("collapsed", expanded);
                        contents.style.display = expanded ? "none" : "block";
                    });

                    node.device.forEach((child) => this.renderNode(child, contents));
                    wrapper.appendChild(busElement);
                    wrapper.appendChild(contents);
                    parentElement.appendChild(wrapper);
                    return;
                }

                const deviceElement = document.createElement("div");
                deviceElement.className = "dev-item";
                deviceElement.innerHTML = `
                    <div class="icon device-icon"><span>${node.name}</span>
                        <div class="tooltip right">
                            Description: ${node.describe || "NULL"}<br>
                            Input: ${node.input || "NULL"}<br>
                            Output: ${node.output || "NULL"}<br>
                        </div>
                    </div>
                `;
                deviceElement.addEventListener("click", (event) => {
                    event.stopPropagation();
                    document.querySelectorAll(".dev-item.active").forEach((element) => {
                        element.classList.remove("active");
                    });
                    deviceElement.classList.add("active");
                });
                parentElement.appendChild(deviceElement);
            }
        };

        const luaThreadManager = {
            threadList: document.getElementById("threadList"),

            updateThreadList(threads) {
                if (!threads || !Array.isArray(threads)) {
                    return;
                }

                this.threadList.innerHTML = "";
                threads.forEach((thread) => {
                    const statusText = thread.status ? ` (${thread.status})` : "";
                    const threadItem = document.createElement("div");
                    threadItem.className = "thread-item";
                    threadItem.innerHTML = `
                        <div class="thread-name">${thread.name}${statusText}</div>
                        <small>RAM: ${thread.memory} KB</small>
                    `;
                    this.threadList.appendChild(threadItem);
                });
            }
        };

        const terminalManager = {
            output: document.getElementById("printDisplay"),
            input: document.getElementById("tasinput"),
            commandHistory: [],
            historyIndex: -1,

            init() {
                this.input.addEventListener("keydown", (event) => {
                    if (event.key === "Enter") {
                        event.preventDefault();
                        this.processCommand();
                    } else if (event.key === "ArrowUp") {
                        event.preventDefault();
                        this.navigateHistory(-1);
                    } else if (event.key === "ArrowDown") {
                        event.preventDefault();
                        this.navigateHistory(1);
                    }
                });
            },

            processCommand() {
                const command = this.input.value.trim();
                if (!command) {
                    return;
                }

                this.commandHistory.push(command);
                this.historyIndex = this.commandHistory.length;
                requestWithTimeout(`/str_input:${command}`).catch(() => {});
                this.input.value = "";
            },

            appendOutput(text) {
                if (Array.isArray(text)) {
                    this.output.value += text.map((item) => String(item)).join("\n") + "\n";
                } else {
                    this.output.value += `${text}\n`;
                }
                this.output.scrollTop = this.output.scrollHeight;
            },

            navigateHistory(direction) {
                if (this.commandHistory.length === 0) {
                    return;
                }

                this.historyIndex = Math.max(
                    0,
                    Math.min(this.commandHistory.length - 1, this.historyIndex + direction)
                );
                this.input.value = this.commandHistory[this.historyIndex] || "";
            }
        };

        const controlSystem = {
            init() {
                document.getElementById("btnRestart").addEventListener("click", () => {
                    requestWithTimeout("/restart_lua").catch(() => {});
                    terminalManager.appendOutput("> Sent Lua restart command...");
                });

                document.getElementById("btnRefresh").addEventListener("click", () => {
                    requestWithTimeout("/refresh_devtree").catch(() => {});
                    terminalManager.appendOutput("> Sent device tree refresh command...");
                });
            }
        };

        document.addEventListener("DOMContentLoaded", () => {
            eventSourceManager.init();
            terminalManager.init();
            controlSystem.init();
        });
    </script>
</body>
</html>
